version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: cenit
      POSTGRES_USER: ${POSTGRES_USER:-xerti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xerti2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xerti} -d cenit"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-xerti}:${POSTGRES_PASSWORD:-xerti2026}@db:5432/cenit
      SECRET_KEY: ${SECRET_KEY:-cambia-esta-clave-en-produccion}
    ports:
      - "8000:8000"

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    restart: always
    depends_on:
      - api
    environment:
      CENIT_API_URL: http://api:8000
    ports:
      - "8501:8501"

volumes:
  postgres_data:
